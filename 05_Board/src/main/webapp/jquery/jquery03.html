<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>

    <style>
        #menu1 {
            position: fixed;
            left: -80px;
            transition: all 0.3s ease-out;
        }
    </style>

    <script src="https://code.jquery.com/jquery-3.7.1.js"
            integrity="sha256-eKhayi8LEQwp4NKxN+CfCh+3qOVUtJn3QNZ0TciWLP4=" crossorigin="anonymous"></script>

    <script>
        $(() => {
            const $menu1 = $("#menu1");
            const $b1 = $("#b1");

            let isOpen = false;

            $b1.click(() => {
                console.log("test", isOpen);

                $menu1.css("left", isOpen ? "-80px" : "0px");
                
                isOpen = !isOpen;
            })

        })
    </script>

</head>
<body>

<button id="b1">menu1</button>

<div id="menu1" style="border: 1px solid; width: 80px">
    <div>
        <a href="https://www.naver.com">naver</a>
    </div>
    <div>
        <a href="https://www.daum.net">daum</a>
    </div>
    <div>
        <a href="https://www.google.com">google</a>
    </div>
</div>


</body>
</html>
