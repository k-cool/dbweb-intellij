<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>


    <script src="https://code.jquery.com/jquery-3.7.1.js"
            integrity="sha256-eKhayi8LEQwp4NKxN+CfCh+3qOVUtJn3QNZ0TciWLP4=" crossorigin="anonymous"></script>

    <script>

        $(() => {

            console.log("ready!");


        })

        function getList() {
            $.ajax({
                url: "get-data",
                type: "GET",
                data: {
                    name: "title",
                    age: 10
                },
                success: (res) => {
                    console.log(res);

                    $.each(res.people, (i, item) => {
                        console.log(i, item);

                        $("span").append(
                            `<h2>${item.no} / ${item.name} / ${item.age}</h2>`
                        )
                    })
                },
                error: (error) => {
                    console.error(error);
                }
            })
        }
    </script>
</head>
<body>

<button onclick="getList()">
    show list
</button>

<span></span>

</body>
</html>
